name: telamon

services:
  # IMPORTANT: restart policy is "no" (manual start via `make up` only).
  # Auto-restart is unsafe with ecryptfs-encrypted home directories — Docker
  # starts before login, bind-mount paths resolve to empty dirs, causing data loss.

  # NOTE: Official Ollama image runs as root. Files in storage/ollama/ are
  # root-owned; `make purge` uses `sudo rm` for cleanup.
  ollama:
    image: ollama/ollama:latest
    container_name: telamon-ollama
    restart: "no"
    ports:
      - "127.0.0.1:17434:11434"
    volumes:
      - ./storage/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: telamon-ollama-init
    # on-failure: retry model pull if it fails (network timeout, Ollama not ready)
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./storage/ollama:/root/.ollama


