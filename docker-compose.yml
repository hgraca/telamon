name: adk

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ogham-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ogham
      POSTGRES_USER: ogham
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./src/docker/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogham"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    container_name: adk-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: adk-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./ollama:/root/.ollama

  obsidian-mcp:
    image: oleksandrkucherenko/obsidian-mcp:latest
    container_name: obsidian-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_KEY=${OBSIDIAN_API_KEY}
      - API_URLS=["https://host.docker.internal:27124"]
      - MCP_TRANSPORTS=stdio,http
