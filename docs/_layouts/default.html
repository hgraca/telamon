<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
  {% seo %}
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/imgs/telamon-icon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="128x128" href="{{ '/assets/imgs/telamon-icon-128.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/imgs/telamon-icon-128.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  {% include nav.html %}
  <main>
    {{ content }}
  </main>
  {% include footer.html %}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>
  <script>
    // Mobile nav toggle
    document.querySelector('.nav-toggle')?.addEventListener('click', function() {
      const links = document.querySelector('.nav-links');
      const expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', !expanded);
      links.classList.toggle('open');
    });
    // Mobile dropdown toggle
    document.querySelectorAll('.nav-dropdown-trigger').forEach(function(trigger) {
      trigger.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          e.preventDefault();
          this.parentElement.classList.toggle('open');
        }
      });
    });
  </script>
  <!-- Default Statcounter code for Telamon https://hgraca.github.io/telamon/ -->
  <script type="text/javascript">
    var sc_project=13223713;
    var sc_invisible=1;
    var sc_security="b80467c7";
  </script>
  <script type="text/javascript"
          src="https://www.statcounter.com/counter/counter.js" async></script>
  <noscript><div class="statcounter"><a title="Web Analytics"
                                        href="https://statcounter.com/" target="_blank"><img class="statcounter"
                                                                                             src="https://c.statcounter.com/13223713/0/b80467c7/1/" alt="Web Analytics"
                                                                                             referrerPolicy="no-referrer-when-downgrade"></a></div></noscript>
  <!-- End of Statcounter Code -->
</body>
</html>
